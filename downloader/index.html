<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Grabit — Save video, photo &amp; reels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14161c;
    --surface:#1c1f27;
    --surface-2:#242833;
    --border:#2e3340;
    --text:#edeef3;
    --muted:#8b90a0;
    --accent:#e8a33d;
    --accent-dim:#8a6528;
    --success:#3ddc97;
    --danger:#e2586b;
    --radius:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    padding-bottom:40px;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 18px;}

  header{padding:28px 0 18px;}
  .brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:26px;
    letter-spacing:-0.02em;
    display:flex;align-items:center;gap:10px;
  }
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);}
  .brand-sub{color:var(--muted);font-size:13px;margin-top:4px;}

  /* platform tabs */
  .tabs{
    display:flex;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:5px;
    gap:4px;
    position:relative;
    margin-top:20px;
  }
  .tab{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    padding:10px 4px 8px;
    border-radius:10px;
    color:var(--muted);
    font-size:11px;
    font-weight:500;
    cursor:pointer;
    transition:color .2s ease;
    position:relative;
    z-index:1;
    user-select:none;
  }
  .tab svg{width:20px;height:20px;stroke:currentColor;fill:none;transition:stroke .2s ease;}
  .tab.active{color:var(--bg);}
  .tab-indicator{
    position:absolute;
    top:5px;bottom:5px;
    width:calc(25% - 3px);
    background:var(--accent);
    border-radius:10px;
    transition:transform .32s cubic-bezier(.65,0,.35,1);
    z-index:0;
  }

  /* input */
  .input-row{
    margin-top:18px;
    display:flex;
    gap:8px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:6px 6px 6px 16px;
    align-items:center;
  }
  .input-row input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:var(--text);
    font-size:14px;
    font-family:'JetBrains Mono',monospace;
    min-width:0;
  }
  .input-row input::placeholder{color:var(--muted);font-family:'Inter',sans-serif;}
  .btn-grab{
    background:var(--accent);
    color:#1a1204;
    border:none;
    font-weight:600;
    font-size:13px;
    padding:11px 18px;
    border-radius:10px;
    cursor:pointer;
    white-space:nowrap;
    transition:transform .12s ease, background .2s ease;
  }
  .btn-grab:active{transform:scale(.96);}
  .btn-grab:disabled{background:var(--accent-dim);color:#5c4a28;cursor:default;}

  /* ad slot */
  .ad-slot{
    margin-top:18px;
    border:1px dashed var(--border);
    border-radius:12px;
    min-height:90px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--muted);
    font-size:11px;
    letter-spacing:.04em;
    text-transform:uppercase;
    position:relative;
  }
  .ad-slot::before{
    content:'Sponsored';
    position:absolute;
    top:6px;left:10px;
    font-size:9px;
    color:var(--muted);
    opacity:.7;
  }

  /* status */
  .status{
    margin-top:16px;
    font-size:13px;
    color:var(--muted);
    display:none;
    align-items:center;
    gap:8px;
  }
  .status.show{display:flex;}
  .status.error{color:var(--danger);}
  .spinner{
    width:14px;height:14px;
    border-radius:50%;
    border:2px solid var(--border);
    border-top-color:var(--accent);
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* result card */
  .result{
    margin-top:18px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    display:none;
  }
  .result.show{display:block;animation:rise .3s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .result-thumb{width:100%;aspect-ratio:16/10;object-fit:cover;background:var(--surface-2);display:block;}
  .thumb-wrap{position:relative;}
  .thumb-wrap video{width:100%;aspect-ratio:16/10;object-fit:cover;background:#000;display:block;}
  .play-overlay{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(20,22,28,.28);
    border:none;cursor:pointer;
    padding:0;
  }
  .play-overlay svg{
    width:52px;height:52px;
    filter:drop-shadow(0 2px 8px rgba(0,0,0,.4));
  }
  .play-overlay.hidden{display:none;}
  .result-body{padding:16px;}
  .result-title{font-size:14px;font-weight:500;line-height:1.4;margin:0 0 4px;}
  .result-meta{font-size:12px;color:var(--muted);margin:0 0 14px;font-family:'JetBrains Mono',monospace;}
  .qualities{display:flex;flex-direction:column;gap:8px;}
  .quality-btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    color:var(--text);
    text-decoration:none;
    font-size:13px;
    font-weight:500;
    transition:border-color .15s ease;
  }
  .quality-btn:active{border-color:var(--accent);}
  .quality-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--accent);
    background:rgba(232,163,61,.1);
    padding:3px 8px;
    border-radius:6px;
  }

  footer{margin-top:32px;text-align:center;color:var(--muted);font-size:11px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand"><span class="dot"></span>Grabit</div>
    <div class="brand-sub">Paste a public link. Get the file.</div>
  </header>

  <div class="tabs" id="tabs">
    <div class="tab-indicator" id="tabIndicator"></div>
    <div class="tab active" data-platform="instagram">
      <svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      Instagram
    </div>
    <div class="tab" data-platform="tiktok">
      <svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M15 3v11.5a3.5 3.5 0 1 1-3-3.46"/><path d="M15 3c.7 2.3 2.4 4 5 4.2"/></svg>
      TikTok
    </div>
    <div class="tab" data-platform="facebook">
      <svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M14 9h3V6h-3c-1.7 0-3 1.3-3 3v2H8v3h3v6h3v-6h3l1-3h-4V9c0-.6.4-1 1-1z"/></svg>
      Facebook
    </div>
    <div class="tab" data-platform="youtube">
      <svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="6" width="18" height="12" rx="3"/><path d="M11 10l4 2-4 2v-4z" fill="currentColor" stroke="none"/></svg>
      YouTube
    </div>
  </div>

  <div class="input-row">
    <input id="urlInput" type="url" placeholder="Paste link here" autocomplete="off" autocapitalize="off">
    <button class="btn-grab" id="grabBtn">Grab</button>
  </div>

  <!-- Adsterra: Banner zone -->
  <div class="ad-slot" id="adBannerTop">
    <!--
      Paste your Adsterra Banner (300x250 / 320x50) script tag here.
      Example:
      <script type="text/javascript">
        atOptions = { key: 'YOUR_BANNER_KEY', format: 'iframe', height: 90, width: 320, params: {} };
      </script>
      <script src="//www.highperformanceformat.com/YOUR_BANNER_KEY/invoke.js"></script>
    -->
  </div>

  <div class="status" id="status">
    <div class="spinner"></div>
    <span id="statusText">Fetching...</span>
  </div>

  <div class="result" id="result">
    <div class="thumb-wrap" id="thumbWrap">
      <img class="result-thumb" id="resultThumb" alt="">
      <button class="play-overlay" id="playBtn" aria-label="Play preview">
        <svg viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="11" fill="rgba(20,22,28,.55)"/><path d="M10 8.5v7l6-3.5-6-3.5z"/></svg>
      </button>
    </div>
    <div class="result-body">
      <p class="result-title" id="resultTitle"></p>
      <p class="result-meta" id="resultMeta"></p>
      <div class="qualities" id="qualities"></div>
    </div>
  </div>

  <footer>
    For personal use with publicly available content only.<br>
    Respect each platform's terms and copyright owners.
  </footer>
</div>

<!-- Adsterra: Social Bar (loads globally, floats itself) -->
<!--
  <script type="text/javascript" src="//YOUR_SOCIAL_BAR_SCRIPT_URL"></script>
-->

<script>
const PLATFORMS = ["instagram", "tiktok", "facebook", "youtube"];
let currentPlatform = "instagram";

const tabsEl = document.getElementById("tabs");
const indicator = document.getElementById("tabIndicator");
const urlInput = document.getElementById("urlInput");
const grabBtn = document.getElementById("grabBtn");
const statusEl = document.getElementById("status");
const statusText = document.getElementById("statusText");
const resultEl = document.getElementById("result");
const resultThumb = document.getElementById("resultThumb");
const thumbWrap = document.getElementById("thumbWrap");
const playBtn = document.getElementById("playBtn");
const resultTitle = document.getElementById("resultTitle");
const resultMeta = document.getElementById("resultMeta");
const qualitiesEl = document.getElementById("qualities");

function moveIndicator(index) {
  indicator.style.transform = `translateX(${index * 100}%)`;
}

tabsEl.querySelectorAll(".tab").forEach((tab, i) => {
  tab.addEventListener("click", () => {
    tabsEl.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentPlatform = tab.dataset.platform;
    moveIndicator(i);
    resultEl.classList.remove("show");
    statusEl.classList.remove("show");
  });
});

function setStatus(msg, isError) {
  statusEl.classList.add("show");
  statusEl.classList.toggle("error", !!isError);
  statusText.textContent = msg;
}

function clearStatus() {
  statusEl.classList.remove("show");
}

grabBtn.addEventListener("click", async () => {
  const url = urlInput.value.trim();
  if (!url) return setStatus("Paste a link first.", true);

  resultEl.classList.remove("show");
  grabBtn.disabled = true;
  setStatus("Fetching...");

  try {
    const res = await fetch(`/api/${currentPlatform}?url=${encodeURIComponent(url)}`);
    const data = await res.json();

    if (!data.success) {
      setStatus(data.error || "Couldn't fetch that link.", true);
      grabBtn.disabled = false;
      return;
    }

    clearStatus();

    // reset thumb area: drop any leftover <video> from a previous preview
    const oldVideo = thumbWrap.querySelector("video");
    if (oldVideo) oldVideo.remove();
    resultThumb.style.display = data.thumbnail ? "block" : "none";
    resultThumb.src = data.thumbnail || "";

    const firstVideo = data.downloads.find(d => d.type === "video");
    playBtn.classList.toggle("hidden", !firstVideo);
    playBtn.onclick = () => {
      if (!firstVideo) return;
      const video = document.createElement("video");
      video.controls = true;
      video.playsInline = true;
      video.poster = data.thumbnail || "";
      video.src = `/api/preview?url=${encodeURIComponent(firstVideo.url)}&platform=${data.platform}`;
      resultThumb.style.display = "none";
      playBtn.classList.add("hidden");
      thumbWrap.appendChild(video);
      video.play().catch(() => {});
    };

    resultTitle.textContent = data.title || "Untitled";
    resultMeta.textContent = data.platform.toUpperCase() + (data.author ? " · @" + data.author : "");

    qualitiesEl.innerHTML = "";
    data.downloads.forEach((d) => {
      const a = document.createElement("a");
      a.className = "quality-btn";
      a.href = `/api/download?url=${encodeURIComponent(d.url)}&platform=${data.platform}&filename=grabit_${Date.now()}`;
      a.innerHTML = `<span>${d.type === "audio" ? "Audio" : "Video"}</span><span class="quality-tag">${d.quality}${d.container ? " · " + d.container : ""}</span>`;
      qualitiesEl.appendChild(a);
    });

    resultEl.classList.add("show");
  } catch (err) {
    setStatus("Network error. Try again.", true);
  } finally {
    grabBtn.disabled = false;
  }
});

moveIndicator(0);
</script>
</body>
</html>
